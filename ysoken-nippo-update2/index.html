<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="theme-color" content="#1c1917" />
  <title>Ｙ’ｓ総建 作業日報</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231c1917'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='%23fbbf24' font-weight='bold'>Y</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #f5f5f4; }
    #boot { font-family: sans-serif; text-align: center; padding-top: 40vh; color: #78716c; font-size: 14px; }
  </style>
</head>
<body>
  <div id="root"><div id="boot">読み込み中…<br /><span style="font-size:11px">画面が変わらない場合は config.js の設定を確認してください</span></div></div>
  <script>
    window.addEventListener("error", function (e) {
      var b = document.getElementById("boot");
      if (b) {
        b.innerHTML = "⚠ アプリの起動に失敗しました。<br />config.js の貼り付け内容（記号や改行の崩れ）を確認し、<br />直して再アップロードしてください。<br /><span style='font-size:10px;color:#a8a29e'>" + (e.message || "") + "</span>";
      }
    });
  </script>
  <script src="./config.js?v=202607060048"></script>
  <script src="./app.js?v=202607060048"></script>
</body>
</html>
